<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بطاقة كرار المتفاعلة</title>
    <style>
        body { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); text-align: center; width: 320px; }
        .info { background: #f1f3f5; margin: 10px 0; padding: 12px; border-radius: 12px; text-align: right; }
        .label { color: #2a5298; font-weight: bold; }
        
        /* تصميم الأزرار */
        .btn { 
            display: inline-block; 
            margin-top: 15px; 
            padding: 10px 20px; 
            background-color: #2a5298; 
            color: white; 
            text-decoration: none; 
            border-radius: 50px; 
            font-size: 14px;
            transition: 0.3s;
        }
        .btn:hover { background-color: #1e3c72; transform: scale(1.1); }
    </style>
</head>
<body>
    <div class="card">
        <h1>كارت مبرمج 💻</h1>
        <div class="info"><span class="label">👤 الاسم:</span> كرار علاء</div>
        <div class="info"><span class="label">📍 الموقع:</span> النجف</div>
        
        <a href="https://www.google.com" class="btn">افتح قوقل 🔍</a>
        <p style="font-size: 11px; color: #999; margin-top: 15px;">مشروع الصف الرابع العلمي</p>
    </div>
</body>
</html>
