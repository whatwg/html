<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بطاقة كرار</title>
    <style>
        body { background-color: #f0f2f5; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 300px; border-top: 8px solid #007bff; }
        .info { background: #f8f9fa; margin: 10px 0; padding: 12px; border-radius: 10px; text-align: right; font-size: 18px; }
        .label { color: #007bff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>بطاقتي الشخصية 🆔</h1>
<div class="info"><span class="label">👤 الاسم:</span> كرار</div>
<div class="info"><span class="label">📍 المكان:</span> النجف</div>
<div class="info"><span class="label">⚽ الهوايات:</span> كرة القدم</div>
        
  
        <p style="color: #888; font-size: 12px; margin-top: 20px;">صنع بواسطة هاتفي 📱</p>
    </div>
</body>
</html>
