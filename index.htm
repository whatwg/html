<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بطاقة كرار الاحترافية</title>
    <style>
        body { 
            /* خلفية متدرجة ألوانها رهيبة */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            text-align: center; 
            width: 320px; 
        }
        .info { 
            background: #f1f3f5; 
            margin: 12px 0; 
            padding: 15px; 
            border-radius: 12px; 
            text-align: right; 
            font-size: 18px;
            transition: 0.3s;
        }
        .info:hover { background: #e9ecef; transform: scale(1.05); }
        .label { color: #764ba2; font-weight: bold; }
        h1 { color: #333; font-size: 24px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>هويتي الرقمية 🚀</h1>
        <div class="info"><span class="label">👤 الاسم:</span> كرار علاء</div>
        <div class="info"><span class="label">📍 السكن:</span> النجف الأشرف</div>
        <div class="info"><span class="label">🎮 الهواية:</span> البرمجة والألعاب</div>
        <p style="color: #666; font-size: 13px; margin-top: 20px;">تم التطوير بواسطة مبرمج المستقبل 💻</p>
    </div>
</body>
</html>
